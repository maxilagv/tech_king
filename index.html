    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — LOCAL BUSINESS (JSON-LD)
         Crítico para Google Maps y búsquedas locales de Once
    ════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ElectronicsStore",
      "@id": "https://nexastore.com.ar/#business",
      "name": "Nexastore",
      "alternateName": "Nexastore Once",
      "description": "Tienda de cargadores, auriculares, accesorios y electrónica en Once, Buenos Aires. Precios mayoristas y minoristas. Envíos a todo Argentina.",
      "url": "https://nexastore.com.ar",
      "telephone": "+54-9-11-5000-3209",
      "email": "soporte@nexastore.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://nexastore.com.ar/brand/nexastore-logo.png"
      },
      "image": [
        "https://i.postimg.cc/HxK9cS11/Chat-GPT-Image-5-mar-2026-12-07-28-p-m.png"
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. Corrientes 2332",
        "addressLocality": "Once",
        "addressRegion": "Buenos Aires",
        "postalCode": "1043",
        "addressCountry": "AR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -34.6083,
        "longitude": -58.4166
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
          "opens": "10:00",
          "closes": "20:00"
        }
      ],
      "priceRange": "$$",
      "currenciesAccepted": "ARS",
      "paymentAccepted": "Efectivo, Tarjeta de crédito, Tarjeta de débito, Transferencia bancaria, Mercado Pago",
      "areaServed": {
        "@type": "Country",
        "name": "Argentina"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Catálogo Nexastore",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Cargadores para celular" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Auriculares bluetooth" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Accesorios para celular" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Cables USB y cargadores" } }
        ]
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — WEBSITE + SEARCHACTION
         Muestra caja de búsqueda en resultados de Google
    ════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nexastore",
      "url": "https://nexastore.com.ar",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://nexastore.com.ar/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
